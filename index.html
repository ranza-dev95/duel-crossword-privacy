<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Duel Crossword</title>
  <meta name="description" content="Duel Crossword legal documents.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fbfcff;
      --surface: #ffffff;
      --text: #182135;
      --muted: #657083;
      --accent: #dc2f3c;
      --border: #e7ecf5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111118;
        --surface: #191925;
        --text: #f7f7fb;
        --muted: #a8adbd;
        --border: #28283a;
      }
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }
    main {
      box-sizing: border-box;
      min-height: 100vh;
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 6vw, 48px);
      line-height: 1.08;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-weight: 600;
    }
    a {
      color: var(--accent);
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Duel Crossword</h1>
      <p>Legal documents for Duel Crossword by Ranza Dev.</p>
      <a href="privacy-policy.html">Privacy Policy</a>
    </section>
  </main>
</body>
</html>
